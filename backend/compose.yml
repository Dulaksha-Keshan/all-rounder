version: "3.8"

services:
  # ============================================
  # MICROSERVICES (Databases run locally)
  # ============================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: all-rounder-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
      - content-service
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - all-rounder-network
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: all-rounder-user-service
    ports:
      - "3001:3001"
    env_file:
      - ./user-service/.env
    volumes:
      - ./user-service:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - all-rounder-network
    restart: unless-stopped

  content-service:
    build:
      context: ./content-service
      dockerfile: Dockerfile
    container_name: all-rounder-content-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/contentdb?authSource=admin
      - USER_SERVICE_URL=http://user-service:3001
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    env_file:
      - ./content-service/.env
    volumes:
      - ./content-service:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - all-rounder-network
    restart: unless-stopped



networks:
  all-rounder-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
