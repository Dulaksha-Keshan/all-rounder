  # ============================================
  # MICROSERVICES
  # ============================================

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: all-rounder-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - CONTENT_SERVICE_URL=http://content-service:3002
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/api-gateway/.env
    depends_on:
      #- redis
      - user-service
      - content-service
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - all-rounder-network
    restart: unless-stopped

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: all-rounder-user-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/userdb
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    env_file:
      - ./backend/user-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      #redis:
      #  condition: service_healthy
      #kafka:
      #  condition: service_healthy
    volumes:
      - ./backend/user-service:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - all-rounder-network
    restart: unless-stopped

  content-service:
    build:
      context: ./backend/content-service
      dockerfile: Dockerfile
    container_name: all-rounder-content-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/contentdb?authSource=admin
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    env_file:
      - ./backend/content-service/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/content-service:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - all-rounder-network
    restart: unless-stopped

